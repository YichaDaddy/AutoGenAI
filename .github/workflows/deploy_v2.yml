name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'daily_topic_dashboard.html'
      - 'v2/index.html'
      - 'v3/index.html'
      - 'v3/marathon.json'
      - 'skills/solopreneur-topic-miner/finance_archive.json'
      - 'skills/solopreneur-topic-miner/topics_archive.json'
      - 'skills/solopreneur-topic-miner/latest_finance_topics.json'
      - 'skills/solopreneur-topic-miner/latest_topics.json'
      - 'skills/solopreneur-topic-miner/daily_quote.json'
      - 'skills/toeic/questions.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Strip omelette-injected scripts
        run: |
          python3 - <<'EOF'
          import re, sys
          with open('v2/index.html', 'r', encoding='utf-8') as f:
              content = f.read()
          cleaned = re.sub(r'<style data-omelette-injected>.*?</style>', '', content, flags=re.DOTALL)
          cleaned = re.sub(r'<script data-omelette-injected>.*?</script>\n?', '', cleaned, flags=re.DOTALL)
          with open('v2/index.html', 'w', encoding='utf-8') as f:
              f.write(cleaned)
          removed = len(content) - len(cleaned)
          print(f"Stripped {removed} chars of injected scripts")
          EOF

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-dir
          fetch-depth: 1

      - name: Copy files to gh-pages
        run: |
          cp -f index.html gh-pages-dir/index.html 2>/dev/null || echo "no root index.html yet"
          cp -f daily_topic_dashboard.html gh-pages-dir/daily_topic_dashboard.html 2>/dev/null || echo "no daily_topic_dashboard.html yet"
          cp v2/index.html gh-pages-dir/v2/index.html
          cp v3/index.html gh-pages-dir/v3/index.html
          cp -f v3/marathon.json gh-pages-dir/v3/marathon.json 2>/dev/null || echo "no marathon.json yet"
          mkdir -p gh-pages-dir/skills/solopreneur-topic-miner gh-pages-dir/skills/toeic
          cp -f skills/solopreneur-topic-miner/finance_archive.json gh-pages-dir/skills/solopreneur-topic-miner/finance_archive.json 2>/dev/null || echo "no finance_archive.json yet"
          cp -f skills/solopreneur-topic-miner/topics_archive.json gh-pages-dir/skills/solopreneur-topic-miner/topics_archive.json 2>/dev/null || echo "no topics_archive.json yet"
          cp -f skills/solopreneur-topic-miner/latest_finance_topics.json gh-pages-dir/skills/solopreneur-topic-miner/latest_finance_topics.json 2>/dev/null || echo "no latest_finance_topics.json yet"
          cp -f skills/solopreneur-topic-miner/latest_topics.json gh-pages-dir/skills/solopreneur-topic-miner/latest_topics.json 2>/dev/null || echo "no latest_topics.json yet"
          cp -f skills/solopreneur-topic-miner/daily_quote.json gh-pages-dir/skills/solopreneur-topic-miner/daily_quote.json 2>/dev/null || echo "no daily_quote.json yet"
          cp -f skills/toeic/questions.json gh-pages-dir/skills/toeic/questions.json 2>/dev/null || echo "no questions.json yet"

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-dir
          git config user.name  "AutoGenAI Bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html daily_topic_dashboard.html v2/index.html v3/index.html v3/marathon.json \
            skills/solopreneur-topic-miner/finance_archive.json \
            skills/solopreneur-topic-miner/topics_archive.json \
            skills/solopreneur-topic-miner/latest_finance_topics.json \
            skills/solopreneur-topic-miner/latest_topics.json \
            skills/solopreneur-topic-miner/daily_quote.json \
            skills/toeic/questions.json 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to deploy" || (
            git commit -m "deploy: sync v2+v3 from main $(date -u '+%Y-%m-%d %H:%M UTC')" &&
            git push origin gh-pages
          )
