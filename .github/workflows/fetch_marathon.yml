name: Fetch Marathon Data

on:
  schedule:
    # 02:00 UTC = 10:00 台灣時間（清晨跑步通常已上傳到 Strava）
    - cron: '0 2 * * *'
  workflow_dispatch:   # 允許手動觸發

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Fetch marathon data
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python scripts/fetch_marathon.py

      - name: Commit & push marathon.json to main
        id: push_main
        run: |
          git config user.name  "AutoGenAI Bot"
          git config user.email "bot@users.noreply.github.com"
          git add v3/marathon.json
          if git diff --staged --quiet; then
            echo "No changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "auto: update marathon data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync marathon.json to gh-pages
        if: steps.push_main.outputs.changed == 'true'
        run: |
          git fetch origin gh-pages
          git worktree add gh-pages-dir origin/gh-pages
          cp v3/marathon.json gh-pages-dir/v3/marathon.json
          cd gh-pages-dir
          git add v3/marathon.json
          git diff --staged --quiet && echo "No changes to deploy" || (
            git commit -m "deploy: sync marathon.json $(date -u '+%Y-%m-%d %H:%M UTC')" &&
            git push origin HEAD:gh-pages
          )
