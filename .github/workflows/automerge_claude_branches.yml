name: Auto-merge Claude routine branches

# The cloud Routine (scheduled daily report) always commits its work to an
# auto-generated claude/* branch instead of pushing to main directly. This
# workflow closes that gap so the pipeline stays fully unattended: any
# claude/* branch that is a clean fast-forward of main gets merged in
# automatically and then deleted. Anything that isn't a clean fast-forward
# (i.e. main has diverged) is left alone for manual review.

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Fast-forward main to branch tip if possible
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name  "AutoGenAI Bot"
          git config user.email "bot@users.noreply.github.com"
          git fetch origin "$BRANCH"

          if git merge-base --is-ancestor origin/main FETCH_HEAD; then
            git merge --ff-only FETCH_HEAD
            git push origin main
            echo "MERGED=true" >> "$GITHUB_ENV"
            echo "Fast-forwarded main to $BRANCH ($(git rev-parse --short FETCH_HEAD))"
          else
            echo "MERGED=false" >> "$GITHUB_ENV"
            echo "$BRANCH is not a clean fast-forward of main (main has diverged) - leaving branch for manual review"
          fi

      - name: Delete merged branch
        if: env.MERGED == 'true'
        env:
          BRANCH: ${{ github.ref_name }}
        run: git push origin --delete "$BRANCH" || true
