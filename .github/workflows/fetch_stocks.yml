name: Fetch Stock Data

on:
  schedule:
    # Taiwan market hours: Mon-Fri 09:00-13:30 CST = 01:00-05:30 UTC
    # Run every 15 min during TW market hours
    - cron: '*/15 1-5 * * 1-5'
    # US market: Mon-Fri 09:30-16:00 EST = 14:30-21:00 UTC
    - cron: '*/15 14-21 * * 1-5'
  workflow_dispatch:   # allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Fetch stock data
        run: python scripts/fetch_stocks.py

      - name: Commit & push stocks.json to main
        id: push_main
        run: |
          git config user.name  "AutoGenAI Bot"
          git config user.email "bot@users.noreply.github.com"
          git add v3/stocks.json
          if git diff --staged --quiet; then
            echo "No changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "auto: update stock data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKEN 的 push 不會觸發 deploy_v2 workflow（GitHub 防遞迴），
      # 所以要在這裡直接同步 gh-pages，作法同 fetch_marathon.yml
      - name: Sync stocks.json to gh-pages
        if: steps.push_main.outputs.changed == 'true'
        run: |
          git fetch origin gh-pages
          git worktree add gh-pages-dir origin/gh-pages
          cp v3/stocks.json gh-pages-dir/v3/stocks.json
          cd gh-pages-dir
          git add v3/stocks.json
          git diff --staged --quiet && echo "No changes to deploy" || (
            git commit -m "deploy: sync stocks.json $(date -u '+%Y-%m-%d %H:%M UTC')" &&
            git push origin HEAD:gh-pages
          )
